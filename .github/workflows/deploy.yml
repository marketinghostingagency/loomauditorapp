name: Deploy to LiquidWeb
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 10m
          script: |
            # Navigate to the deployment folder on your server
            # Note: You MUST update this path if cloning the repo somewhere else!
            cd /var/www/audit.marketinghosting.agency
            
            # Pull the latest code from GitHub
            git pull origin main
            
            # Install any new dependencies
            npm install --legacy-peer-deps
            
            # Rebuild the Next.js application cache
            npm run build
            
            # Reload the background process seamlessly with zero downtime
            pm2 reload loom-auditor || pm2 start npm --name "loom-auditor" -- start
